services:
  neo4j:
    image: neo4j:5
    container_name: hypothesis-factory-neo4j
    ports:
      - "7474:7474" # браузерный интерфейс Neo4j
      - "7687:7687" # bolt-протокол (драйвер)
    environment:
      NEO4J_AUTH: neo4j/hypothesis-factory
    volumes:
      - neo4j_data:/data

volumes:
  neo4j_data:
