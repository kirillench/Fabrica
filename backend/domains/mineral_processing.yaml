# Домен-специфичные указания для LLM при генерации гипотез
prompt_hints: |
  Домен — обогащение руд (флотация, измельчение, переработка хвостов).
  Оперируй показателями: извлечение (%), содержание (%), выход концентрата,
  плотность пульпы, класс крупности (например -71 мкм), расход реагентов (г/т).
  Типовые рычаги: реагентный режим, гранулометрия питания, фронт флотации,
  время агитации, схемные решения (доизмельчение, контрольные операции).

# Типовые шаги проверки для конструктора дорожных карт
# (LLM и демо-режим используют их как основу, пользователь редактирует)
roadmap_templates:
  - name: Отбор и подготовка технологических проб
    duration_days: 5
    cost: 150000
    resources: Пробоотборщик, лаборант
  - name: Ситовой и химический анализ проб
    duration_days: 7
    cost: 200000
    resources: Аналитическая лаборатория
  - name: Лабораторные флотационные опыты
    duration_days: 14
    cost: 400000
    resources: Флотомашина лаб., 2 исследователя
  - name: Обработка результатов и баланс металлов
    duration_days: 5
    cost: 100000
    resources: Технолог
  - name: Опытно-промышленные испытания
    duration_days: 30
    cost: 2000000
    resources: Участок ОПИ, технологическая смена
