# Доменный пакет: полимеры и композиты (заготовка — демонстрация
# подключения новой области без изменения ядра)
id: polymers
name: Полимеры и композиты
description: Полимерные материалы, наполнители, композиты

entity_types:
  material: Материал
  process: Процесс
  parameter: Параметр
  property: Свойство

dictionaries:
  material:
    Полимер: [полимер, полимера, полимеры]
    Наполнитель: [наполнитель, наполнителя]
    Стекловолокно: [стекловолокно, стекловолокна]
    Углеволокно: [углеволокно, углеродное волокно]
    Матрица: [матрица, матрицы]
  process:
    Экструзия: [экструзия, экструзии]
    Литьё под давлением: [литьё под давлением, литья под давлением]
    Отверждение: [отверждение, отверждения]
    Компаундирование: [компаундирование, компаундирования]
  parameter:
    Температура переработки: [температура переработки]
    Степень наполнения: [степень наполнения, содержание наполнителя]
  property:
    Ударная вязкость: [ударная вязкость, ударной вязкости]
    Модуль упругости: [модуль упругости]
    Термостойкость: [термостойкость, термостойкости]

prompt_hints: |
  Домен — полимерные материалы и композиты. Оперируй составами компаундов,
  режимами переработки, границей раздела волокно–матрица.

roadmap_templates:
  - name: Подготовка компаундов
    duration_days: 7
    cost: 250000
    resources: Экструдер, технолог
  - name: Изготовление образцов
    duration_days: 5
    cost: 100000
    resources: ТПА, оснастка
  - name: Физико-механические испытания
    duration_days: 10
    cost: 200000
    resources: Испытательная лаборатория
